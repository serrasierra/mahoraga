name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Lets you run the latest workflow from the Actions tab (re-run failed job replays the *old* commit).
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --run

      - name: Check formatting and linting
        run: npm run check

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format and fix code
        run: npm run check:fix

      - name: Build worker (TypeScript)
        run: npm run build

      - name: Prepare Wrangler config (fallback if wrangler.jsonc missing)
        run: |
          set -euo pipefail
          if [ -f wrangler.jsonc ]; then
            echo "Using committed wrangler.jsonc"
            exit 0
          fi
          if [ -n "${WRANGLER_JSONC:-}" ]; then
            echo "$WRANGLER_JSONC" > wrangler.jsonc
            echo "Wrote wrangler.jsonc from WRANGLER_JSONC secret"
            exit 0
          fi
          if [ -n "${D1_DATABASE_ID:-}" ] && [ -n "${KV_NAMESPACE_ID:-}" ] && [ -n "${KV_PREVIEW_NAMESPACE_ID:-}" ]; then
            cp wrangler.example.jsonc wrangler.jsonc
            sed -i \
              -e "s|<YOUR_D1_DATABASE_ID>|${D1_DATABASE_ID}|g" \
              -e "s|<YOUR_KV_NAMESPACE_ID>|${KV_NAMESPACE_ID}|g" \
              -e "s|<YOUR_KV_PREVIEW_NAMESPACE_ID>|${KV_PREVIEW_NAMESPACE_ID}|g" \
              wrangler.jsonc
            echo "Wrote wrangler.jsonc from D1/KV secrets"
            exit 0
          fi
          echo "::error::Add one of: (1) committed wrangler.jsonc, (2) Actions secret WRANGLER_JSONC (full file contents from your machine), or (3) secrets D1_DATABASE_ID + KV_NAMESPACE_ID + KV_PREVIEW_NAMESPACE_ID."
          exit 1
        env:
          WRANGLER_JSONC: ${{ secrets.WRANGLER_JSONC }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          KV_PREVIEW_NAMESPACE_ID: ${{ secrets.KV_PREVIEW_NAMESPACE_ID }}

      - name: Deploy to Cloudflare
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Set the GitHub Actions repository secret CLOUDFLARE_API_TOKEN (Workers: Edit Cloudflare API token with Workers Scripts:Edit)."
            exit 1
          fi
          npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
